<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Character Counter</title>
    <style>
        /* Color Palette: 
           Pink: #fbcce7 | Purple: #c3aed6 | Pista Green: #e1eedd 
        */
        body {
            background-color:lightblue; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color:#c3aed6;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            color: #6b4f8c; 
            margin-top: 0;
        }

        .instruction {
            color: #777;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #e1eedd; /* Pista Green */
            border: 2px solid #bcd4b7;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            color: #4a5d48;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
            resize: none;
        }

        textarea:focus {
            border-color: #c3aed6; /* Purple focus */
        }

        .counter-row {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-weight: bold;
            color: #6b4f8c; /* Purple */
        }

        #warning {
            color: #d9534f;
            font-size: 14px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color:#777; /* Purple */
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Real-Time Character Counter</h2>
    <p class="instruction">200 characters max</p>
    
    <textarea id="messageBox" maxlength="200" placeholder="Enter Your Message Here..."></textarea>
    
    <div class="counter-row">
        <span id="charCount">0/200 characters</span>
        <span id="remainingCount">Remaining: 200</span>
    </div>

    <p id="warning">Stop! You have reached the character limit.</p>
    
    <button class="submit-btn">Submit Message</button>
</div>

<script>
    // Using var for all declarations as requested
    var textarea = document.getElementById('messageBox');
    var charDisplay = document.getElementById('charCount');
    var remainDisplay = document.getElementById('remainingCount');
    var warning = document.getElementById('warning');
    var maxLength = 200;

    textarea.addEventListener('input', function() {
        var currentLength = textarea.value.length;
        var remaining = maxLength - currentLength;

        // Real-time UI updates
        charDisplay.innerHTML = currentLength + "/" + maxLength + " characters";
        remainDisplay.innerHTML = "Remaining: " + remaining;

        // Handling the warning display and border colors
        if (currentLength >= maxLength) {
            warning.style.display = 'block';
            textarea.style.border = '2px solid #d9534f'; 
        } else {
            warning.style.display = 'none';
            textarea.style.border = '2px solid #bcd4b7'; 
        }
    });
</script>

</body>
</html>
